name: Build iOS .ipa (para Sideloadly)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-26          # ← ESTO ES LO IMPORTANTE (cámbialo aquí)

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Instalar workload MAUI
        run: dotnet workload install maui

      - name: Compilar y generar .ipa SIN firma
        run: |
          dotnet publish "${{ github.workspace }}/pruebaMaui.csproj" \
            --configuration Release \
            --framework net10.0-ios \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:BuildIpa=true \
            -p:EnableCodeSigning=false \
            -p:EnablePackageSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:SignBundle=false

      - name: Subir .ipa como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: pruebaMaui-IPA
          path: '**/*.ipa'
          retention-days: 7
